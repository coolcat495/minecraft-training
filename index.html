<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Arena - Battle Ready</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; overflow: hidden; }
        
        /* MENU STYLES */
        #menuContainer { width: 100%; height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #1a1a1a 0%, #2d5016 100%); position: absolute; z-index: 10; }
        .header { background: rgba(0, 0, 0, 0.8); padding: 15px 30px; border-bottom: 3px solid #4caf50; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 28px; color: #4caf50; text-shadow: 2px 2px #000; }
        .content { flex: 1; display: flex; }
        .sidebar { width: 250px; background: rgba(0, 0, 0, 0.9); border-right: 2px solid #2d5016; padding: 20px; }
        .menu-btn { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 2px solid #4caf50; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .menu-btn:hover { background: #4caf50; color: #000; transform: scale(1.05); }
        .main-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: rgba(0,0,0,0.3); }

        /* GAME STYLES */
        #gameContainer { display: none; width: 100%; height: 100vh; position: relative; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; color: white; font-size: 24px; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        #crosshair::before { content: '+'; }
        #hud { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 15px; border: 2px solid #4caf50; border-radius: 5px; pointer-events: none; }
        #instructions { position: absolute; top: 20%; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menuContainer">
        <div class="header">
            <h1>MINECRAFT BATTLE ARENA</h1>
            <div>Speler: <strong>jooren</strong></div>
        </div>
        <div class="content">
            <div class="sidebar">
                <button class="menu-btn" onclick="startWorld()">PVP ARENA</button>
                <button class="menu-btn" onclick="startWorld()">TRAINING GROUND</button>
                <button class="menu-btn" style="border-color: #f44336;" onclick="alert('Instellingen komen binnenkort!')">SETTINGS</button>
            </div>
            <div class="main-area">
                <h2 style="font-size: 48px; color: #4caf50; margin-bottom: 10px;">BATTLE ARENA</h2>
                <p>Klik op de knop links om de arena te betreden.</p>
            </div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="instructions">Klik op het scherm om te bewegen! <br> (WASD = Lopen | Spatie = Springen | ESC = Menu)</div>
        <div id="crosshair"></div>
        <div id="hud">
            <p id="coords">X: 0, Y: 1.6, Z: 0</p>
            <p>Snelheid: <span id="speed">0</span></p>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Three.js en PointerLockControls -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();

        function startWorld() {
            document.getElementById('menuContainer').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            // Licht
            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75);
            light.position.set(0.5, 1, 0.75);
            scene.add(light);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
            sunLight.position.set(10, 20, 10);
            scene.add(sunLight);

            // Controls
            controls = new THREE.PointerLockControls(camera, document.body);
            
            document.getElementById('gameContainer').addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                document.getElementById('instructions').style.display = 'none';
            });

            controls.addEventListener('unlock', () => {
                document.getElementById('instructions').style.display = 'block';
            });

            scene.add(controls.getObject());

            // Key events
            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true) velocity.y += 150; canJump = false; break;
                    case 'ShiftLeft': camera.position.y = 1.0; break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': camera.position.y = 1.6; break;
                    case 'Escape': controls.unlock(); break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // Grond (Minecraft Gras stijl)
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x3d8c40 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Arena Muren
            const wallMat = new THREE.MeshPhongMaterial({ color: 0x808080 });
            for(let i = 0; i < 4; i++) {
                const wallGeo = new THREE.BoxGeometry(100, 5, 1);
                const wall = new THREE.Mesh(wallGeo, wallMat);
                if(i === 0) wall.position.set(0, 2.5, -50);
                if(i === 1) wall.position.set(0, 2.5, 50);
                if(i === 2) { wall.position.set(-50, 2.5, 0); wall.rotation.y = Math.PI / 2; }
                if(i === 3) { wall.position.set(50, 2.5, 0); wall.rotation.y = Math.PI / 2; }
                scene.add(wall);
            }

            // Test blokken
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            for(let i = 0; i < 10; i++) {
                const boxMat = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(Math.random() * 20 - 10, 0.5, Math.random() * 20 - 10);
                scene.add(box);
            }

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 40.0 * delta; // Zwaartekracht

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true;
                }

                // Update HUD
                const pos = controls.getObject().position;
                document.getElementById('coords').innerText = `X: ${pos.x.toFixed(1)}, Y: ${pos.y.toFixed(1)}, Z: ${pos.z.toFixed(1)}`;
                document.getElementById('speed').innerText = Math.abs(velocity.z).toFixed(0);

                prevTime = time;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
