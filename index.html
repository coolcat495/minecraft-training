<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Training - Full Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Courier New', monospace; color: white; }
        #overlay { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: rgba(0,0,0,0.8); z-index: 100; cursor: pointer;
        }
        #gui { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 10px; border: 2px solid #4caf50; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 30px; z-index: 5; pointer-events: none; }
        
        /* PLAYER MODEL (Voor 2nd/3rd person) */
        #player-model { 
            position: absolute; width: 40px; height: 80px; background: #00acc1; 
            display: none; transform-style: preserve-3d; border: 2px solid #000;
        }

        /* ENGINE */
        #viewport { width: 100vw; height: 100vh; perspective: 800px; display: flex; justify-content: center; align-items: center; }
        #world { width: 0; height: 0; transform-style: preserve-3d; transition: transform 0.05s linear; }
        .face { position: absolute; transform-style: preserve-3d; }
        .floor { width: 2000px; height: 2000px; background: #2d5016; background-image: repeating-linear-gradient(0deg, transparent, transparent 49px, #1e3b0e 50px), repeating-linear-gradient(90deg, transparent, transparent 49px, #1e3b0e 50px); transform: rotateX(90deg) translate3d(-1000px, -1000px, 0); }
        .wall { width: 2000px; height: 400px; background: rgba(255,255,255,0.1); border: 4px solid #4caf50; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startEngine()">
        <h1 style="color: #4caf50;">MINECRAFT ARENA</h1>
        <button style="padding: 15px 30px; font-size: 20px;">START TRAINING</button>
        <p>WASD = Bewegen | Spatie = Springen | F4 = Camera (1st/2nd/3rd)</p>
    </div>

    <div id="crosshair">+</div>
    <div id="gui">Mode: <span id="camera-mode">1st Person</span> | FPS: 60</div>

    <div id="viewport">
        <div id="world">
            <div id="player-model"></div> <!-- Het 'poppetje' voor 3rd person -->
            <div class="face floor"></div>
            <div class="face wall" style="transform: translate3d(-1000px, -400px, 1000px);"></div>
            <div class="face wall" style="transform: translate3d(-1000px, -400px, -1000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-1000px, -400px, 1000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-1000px, -400px, -1000px);"></div>
        </div>
    </div>

    <script>
        let posX = 0, posZ = 0, posY = 0, rotY = 0, rotX = 0;
        let velY = 0;
        let keys = {};
        let viewMode = 0; // 0: 1st, 1: 3rd Back, 2: 2nd Front

        function startEngine() {
            document.getElementById('overlay').style.display = 'none';
            document.body.requestPointerLock();
            animate();
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // F4 Detectie (of gewone '4' als F4 niet werkt op je laptop)
            if (e.code === 'F4' || e.key === '4') {
                e.preventDefault();
                viewMode = (viewMode + 1) % 3;
                updateCameraMode();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                rotY -= e.movementX * 0.2;
                rotX -= e.movementY * 0.2;
                if(rotX > 80) rotX = 80; if(rotX < -80) rotX = -80;
            }
        });

        function updateCameraMode() {
            const player = document.getElementById('player-model');
            const modeText = ["1st Person", "3rd Person Back", "2nd Person Front"];
            document.getElementById('camera-mode').innerText = modeText[viewMode];
            player.style.display = (viewMode === 0) ? "none" : "block";
        }

        function animate() {
            const speed = 7;
            const rad = rotY * Math.PI / 180;

            // WASD LOPEN (Strafing)
            if (keys['KeyW']) { posX -= Math.sin(rad) * speed; posZ += Math.cos(rad) * speed; }
            if (keys['KeyS']) { posX += Math.sin(rad) * speed; posZ -= Math.cos(rad) * speed; }
            if (keys['KeyA']) { posX -= Math.cos(rad) * speed; posZ -= Math.sin(rad) * speed; }
            if (keys['KeyD']) { posX += Math.cos(rad) * speed; posZ += Math.sin(rad) * speed; }

            // SPRINGEN
            if (keys['Space'] && posY <= 0) { velY = 12; }
            posY += velY;
            if (posY > 0) velY -= 0.8; else { posY = 0; velY = 0; }

            // CAMERA POSITIE (Z-offset voor 3rd person)
            let camZ = 0, camY = 150 + posY, camRotY = rotY;
            if (viewMode === 1) { camZ = -400; } // 3rd Person Back
            if (viewMode === 2) { camZ = 400; camRotY = rotY + 180; } // 2nd Person Front

            const world = document.getElementById('world');
            world.style.transform = `rotateX(${rotX}deg) rotateY(${camRotY}deg) translate3d(${posX}px, ${camY}px, ${posZ}px) translateZ(${camZ}px)`;

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
