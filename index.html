<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minecraft Arena Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instructions { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            color: white; font-family: sans-serif; font-weight: bold;
            text-shadow: 2px 2px #000; z-index: 10; cursor: pointer;
        }
        #hud { position: absolute; bottom: 10px; left: 10px; color: lime; font-family: monospace; z-index: 5; }
    </style>
</head>
<body>

    <div id="instructions" onclick="controls.lock()">
        <h1>ARENA LADEN VOLTOOID</h1>
        <p>KLIK HIER OM TE BEWEGEN</p>
        <p>(WASD + MUIS)</p>
    </div>
    <div id="hud">Systeem status: ONLINE</div>

    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // 1. Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Blauwe lucht

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15); // Startpositie: iets naar achteren en omhoog

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Arena Objecten
        // De Grond (Groen)
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshBasicMaterial({ color: 0x2d5016, side: THREE.DoubleSide })
        );
        ground.rotation.x = Math.PI / 2;
        scene.add(ground);

        // Grid (Hulplijnen op de grond)
        const grid = new THREE.GridHelper(40, 40, 0xffffff, 0x444444);
        scene.add(grid);

        // De Arena Muren (Roodachtig voor zichtbaarheid)
        const wallMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
        const wallGeo = new THREE.BoxGeometry(40, 10, 1);
        
        const wall1 = new THREE.Mesh(wallGeo, wallMat); wall1.position.set(0, 5, -20); scene.add(wall1);
        const wall2 = new THREE.Mesh(wallGeo, wallMat); wall2.position.set(0, 5, 20); scene.add(wall2);
        const wall3 = new THREE.Mesh(wallGeo, wallMat); wall3.position.set(-20, 5, 0); wall3.rotation.y = Math.PI/2; scene.add(wall3);
        const wall4 = new THREE.Mesh(wallGeo, wallMat); wall4.position.set(20, 5, 0); wall4.rotation.y = Math.PI/2; scene.add(wall4);

        // 3. Besturing
        const controls = new THREE.PointerLockControls(camera, document.body);
        
        controls.addEventListener('lock', () => {
            document.getElementById('instructions').style.display = 'none';
        });
        controls.addEventListener('unlock', () => {
            document.getElementById('instructions').style.display = 'block';
        });

        // Beweging
        let moveF = false, moveB = false, moveL = false, moveR = false;
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true;
            if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false;
            if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

        // 4. Render Loop
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                if(moveF) controls.moveForward(0.2);
                if(moveB) controls.moveForward(-0.2);
                if(moveL) controls.moveRight(-0.2);
                if(moveR) controls.moveRight(0.2);
                
                // Houd speler op de grond
                camera.position.y = 2; 
            }
            renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
