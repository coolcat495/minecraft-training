<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Arena Pro</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #000; }
        #menu { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.minecraft.net'); background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { padding: 15px 40px; font-size: 20px; background: #555; color: white; border: 3px solid #000; cursor: pointer; margin: 10px; }
        .btn:hover { background: #4caf50; }
        #gui { position: absolute; bottom: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color: #4caf50; font-size: 50px; text-shadow: 4px 4px #000;">BATTLE ARENA</h1>
        <button class="btn" onclick="startGame()">START TRAINING</button>
    </div>

    <div id="crosshair">+</div>
    <div id="gui">
        <p>WASD: Bewegen | SPATIE: Springen</p>
        <p id="stats">FPS: 60 | Pos: 0, 0, 0</p>
    </div>

    <!-- Scripts via betrouwbare CDN -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            init();
        }

        function init() {
            // 1. Scene & Lucht
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x72a1ff);
            scene.fog = new THREE.Fog(0x72a1ff, 0, 100);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 3. Licht
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // 4. De Grond (Gras blokken effect)
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a9142 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 5. Arena Muren
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x7a7a7a });
            for(let i = 0; i < 4; i++) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(200, 10, 2), wallMat);
                if(i === 0) wall.position.set(0, 5, -100);
                if(i === 1) wall.position.set(0, 5, 100);
                if(i === 2) { wall.position.set(-100, 5, 0); wall.rotation.y = Math.PI/2; }
                if(i === 3) { wall.position.set(100, 5, 0); wall.rotation.y = Math.PI/2; }
                scene.add(wall);
            }

            // 6. Zwaard (Hand van de speler)
            const sword = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1), new THREE.MeshLambertMaterial({color: 0xcccccc}));
            sword.position.set(0.5, -0.5, -1);
            camera.add(sword);
            scene.add(camera);

            // 7. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 8. Besturing
            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());

            const onKeyDown = (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if(canJump) velocity.y += 12; canJump = false; break;
                }
            };
            const onKeyUp = (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Wrijving en Zwaartekracht
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 30.0 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                // Grond-check
                if (controls.getObject().position.y < 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true;
                }

                document.getElementById('stats').innerText = `Pos: ${camera.position.x.toFixed(0)}, ${camera.position.z.toFixed(0)}`;
                prevTime = time;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
