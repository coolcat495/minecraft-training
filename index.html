<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Battle & Build Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', monospace; }
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn { padding: 15px 40px; margin: 10px; background: #555; border: 4px solid #000; color: white; font-size: 20px; cursor: pointer; min-width: 250px; }
        .btn:hover { background: #4caf50; }
        
        /* HOTBAR */
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.5); border: 4px solid #333; padding: 2px; z-index: 100; }
        .slot { width: 50px; height: 50px; border: 4px solid #8b8b8b; margin: 2px; background-size: 35px; background-position: center; background-repeat: no-repeat; }
        .active { border-color: #fff; box-shadow: inset 0 0 10px #fff; }

        /* HAND & SWORD */
        #viewmodel { position: absolute; bottom: -20px; right: 10%; width: 350px; height: 350px; pointer-events: none; z-index: 50; transition: transform 0.1s; }
        #arm { position: absolute; bottom: -80px; right: 30px; width: 100px; height: 250px; background: #ffdbac; border: 4px solid #ccac8a; transform: rotate(-15deg); }
        #sword { position: absolute; bottom: 80px; right: 60px; width: 150px; height: 150px; background: url('https://minecraft.wiki') no-repeat center; background-size: contain; transform: rotate(-25deg); }
        .swing { transform: rotate(-45deg) translateY(-60px) !important; }

        /* WORLD ENGINE */
        #viewport { width: 100vw; height: 100vh; perspective: 900px; display: flex; justify-content: center; align-items: center; }
        #world { width: 0; height: 0; transform-style: preserve-3d; }
        .face { position: absolute; transform-style: preserve-3d; backface-visibility: hidden; }
        .floor { width: 2000px; height: 2000px; background: #3d6b28; background-image: url('https://minecraft.wiki'); background-size: 64px; transform: rotateX(90deg) translate3d(-1000px, -1000px, 0); }
        .wall { width: 2000px; height: 800px; background: #7a7a7a; border: 10px solid #555; background-image: url('https://minecraft.wiki'); background-size: 100px; }
    </style>
</head>
<body onmousedown="handleAction(event)">

    <div id="menu">
        <h1 style="color: #4caf50; font-size: 50px;">MINECRAFT TRAINING</h1>
        <button class="btn" onclick="start(false)">PVP MODE (SURVIVAL)</button>
        <button class="btn" onclick="start(true)">BUILD MODE (CREATIVE)</button>
    </div>

    <div id="hotbar">
        <div class="slot active" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>

    <div id="viewmodel">
        <div id="sword"></div>
        <div id="arm"></div>
    </div>

    <div id="viewport">
        <div id="world">
            <div class="face floor"></div>
            <div class="face wall" style="transform: translate3d(-1000px, -800px, 1000px);"></div>
            <div class="face wall" style="transform: translate3d(-1000px, -800px, -1000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-1000px, -800px, 1000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-1000px, -800px, -1000px);"></div>
        </div>
    </div>

    <script>
        let posX = 0, posZ = 0, posY = 0, rotY = 0, rotX = 0, velY = 0;
        let keys = {}, creative = false;

        function start(mode) {
            creative = mode;
            document.getElementById('menu').style.display = 'none';
            document.body.requestPointerLock();
            animate();
        }

        function handleAction(e) {
            const vm = document.getElementById('viewmodel');
            vm.classList.add('swing');
            setTimeout(() => vm.classList.remove('swing'), 100);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                rotY -= e.movementX * 0.15;
                rotX -= e.movementY * 0.15;
                rotX = Math.max(-85, Math.min(85, rotX)); // Niet door grond kijken
            }
        });

        function animate() {
            const speed = creative ? 15 : 8;
            const rad = rotY * Math.PI / 180;

            let nextX = posX, nextZ = posZ;
            if (keys['KeyW']) { nextX -= Math.sin(rad) * speed; nextZ += Math.cos(rad) * speed; }
            if (keys['KeyS']) { nextX += Math.sin(rad) * speed; nextZ -= Math.cos(rad) * speed; }
            if (keys['KeyA']) { nextX -= Math.cos(rad) * speed; nextZ -= Math.sin(rad) * speed; }
            if (keys['KeyD']) { nextX += Math.cos(rad) * speed; nextZ += Math.sin(rad) * speed; }

            // COLLISION: Niet door muren (2000x2000 arena)
            if (Math.abs(nextX) < 950) posX = nextX;
            if (Math.abs(nextZ) < 950) posZ = nextZ;

            // FLY vs JUMP
            if (creative) {
                if (keys['Space']) posY += speed;
                if (keys['ShiftLeft']) posY -= speed;
            } else {
                if (keys['Space'] && posY <= 0) velY = 12;
                posY += velY;
                if (posY > 0) velY -= 0.8; else { posY = 0; velY = 0; }
            }

            const world = document.getElementById('world');
            // Zorg dat we nooit "onder" de grond kijken
            world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translate3d(${posX}px, ${160 + posY}px, ${posZ}px)`;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
