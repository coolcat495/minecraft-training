<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Training Arena Pro</title>
    <style>
        /* RESET & BASIS */
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Courier New', monospace; color: white; }
        
        /* OVERLAY / MENU */
        #overlay { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.minecraft.net');
            background-size: cover; z-index: 100; cursor: pointer; text-align: center;
        }
        .btn { padding: 20px 40px; background: #4caf50; border: 4px solid #2d5016; color: white; font-size: 24px; font-weight: bold; cursor: pointer; text-shadow: 2px 2px #000; }
        .btn:hover { background: #66bb6a; transform: scale(1.05); }

        /* HUD & GUI */
        #gui { position: absolute; bottom: 20px; left: 20px; color: #4caf50; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border: 2px solid #4caf50; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 30px; z-index: 5; pointer-events: none; opacity: 0.8; }
        
        /* ZWAARD (HOTBAR ITEM) */
        #sword { 
            position: absolute; bottom: -20px; right: 20%; width: 150px; height: 150px;
            background: url('https://minecraft.wiki') no-repeat center;
            background-size: contain; z-index: 20; pointer-events: none; transition: transform 0.1s;
            transform: rotate(-10deg);
        }
        .swing { transform: rotate(-60deg) translateY(-50px) !important; }

        /* CSS 3D ENGINE (Werkt zonder externe scripts) */
        #viewport { width: 100vw; height: 100vh; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        #world { width: 0; height: 0; transform-style: preserve-3d; }
        
        .face { position: absolute; transform-style: preserve-3d; }
        
        /* GROND: 20x20 blokken effect */
        .floor { 
            width: 1000px; height: 1000px; background: #2d5016; 
            background-image: repeating-linear-gradient(0deg, transparent, transparent 49px, #1e3b0e 50px), 
                              repeating-linear-gradient(90deg, transparent, transparent 49px, #1e3b0e 50px);
            transform: rotateX(90deg) translateZ(0) translateX(-500px) translateY(-500px); 
        }
        
        /* GLAS MUREN */
        .wall { 
            width: 1000px; height: 300px; background: rgba(173, 216, 230, 0.2); 
            border: 4px solid rgba(255,255,255,0.5); box-sizing: border-box; 
        }
    </style>
</head>
<body onmousedown="swingSword()">

    <div id="overlay" onclick="startEngine()">
        <h1 style="font-size: 60px; text-shadow: 4px 4px #000; color: #4caf50;">BATTLE ARENA</h1>
        <div class="btn">START TRAINING</div>
        <p style="margin-top: 20px;">WASD = Lopen/Draaien | Muis = Rondkijken | Klik = Slaan</p>
    </div>

    <div id="crosshair">+</div>
    <div id="sword"></div>
    
    <div id="gui">
        SPELER: jooren <br>
        COORD: <span id="pos-display">0, 0</span>
    </div>

    <div id="viewport">
        <div id="world">
            <!-- Arena Vloer -->
            <div class="face floor"></div>
            
            <!-- Arena Muren (20x20 schaal) -->
            <div class="face wall" style="transform: translate3d(-500px, -300px, 500px);"></div>
            <div class="face wall" style="transform: translate3d(-500px, -300px, -500px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-500px, -300px, 500px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-500px, -300px, -500px);"></div>
        </div>
    </div>

    <script>
        let posX = 0, posZ = 0, rotY = 0, rotX = -10;
        let keys = {};

        function startEngine() {
            document.getElementById('overlay').style.display = 'none';
            // Pointer lock voor muisbesturing
            if (document.body.requestPointerLock) {
                document.body.requestPointerLock();
            }
            animate();
        }

        function swingSword() {
            const sword = document.getElementById('sword');
            sword.classList.add('swing');
            setTimeout(() => sword.classList.remove('swing'), 100);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Muis voor rondkijken
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                rotY -= e.movementX * 0.2;
                rotX -= e.movementY * 0.2;
            }
        });

        function animate() {
            const speed = 8;
            const rotationSpeed = 3.5;

            // DRAAIEN met A en D
            if (keys['KeyA']) rotY += rotationSpeed; // Naar links <
            if (keys['KeyD']) rotY -= rotationSpeed; // Naar rechts >

            // LOPEN met W en S (richting waar je naar kijkt)
            if (keys['KeyW']) { 
                posX -= Math.sin(rotY * Math.PI / 180) * speed; 
                posZ += Math.cos(rotY * Math.PI / 180) * speed; 
            }
            if (keys['KeyS']) { 
                posX += Math.sin(rotY * Math.PI / 180) * speed; 
                posZ -= Math.cos(rotY * Math.PI / 180) * speed; 
            }

            // Limiet voor verticaal kijken
            if (rotX > 60) rotX = 60;
            if (rotX < -60) rotX = -60;

            // Update Wereld
            const world = document.getElementById('world');
            world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translate3d(${posX}px, 200px, ${posZ}px)`;

            // Update HUD
            document.getElementById('pos-display').innerText = `${Math.round(posX/10)}, ${Math.round(posZ/10)}`;

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
