<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Pro Arena</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', monospace; color: white; }
        #overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 1000; cursor: pointer; }
        #gui { position: absolute; bottom: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); padding: 15px; border: 4px solid #4caf50; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 30px; z-index: 5; pointer-events: none; }

        /* PIXEL ART DIAMOND SWORD */
        #hand-container { position: absolute; bottom: -20px; right: 10%; width: 250px; height: 250px; pointer-events: none; z-index: 50; transition: transform 0.1s; transform-origin: bottom right; }
        #sword-pixel { 
            position: absolute; width: 20px; height: 20px;
            background: #00ffff;
            box-shadow: 
                20px -20px 0 #00ffff, 40px -40px 0 #00ffff, 60px -60px 0 #00ffff, 80px -80px 0 #00ffff, 100px -1000x 0 #00ffff,
                100px -100px 0 #00ffff, 120px -120px 0 #00ffff, 140px -140px 0 #00ffff,
                /* De randen */
                0px -20px 0 #008b8b, 20px -40px 0 #008b8b, 40px -60px 0 #008b8b, 60px -80px 0 #008b8b,
                20px 0px 0 #008b8b, 40px -20px 0 #008b8b, 60px -40px 0 #008b8b, 80px -60px 0 #008b8b,
                /* Het handvat */
                -20px 20px 0 #8b4513, -40px 40px 0 #8b4513, -20px 40px 0 #000, -40px 20px 0 #000;
            bottom: 100px; right: 100px; transform: rotate(-10deg);
        }
        .swing { transform: rotate(-50deg) translateY(-40px) !important; }

        /* ARENA & WERELD */
        #viewport { width: 100vw; height: 100vh; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        #world { width: 0; height: 0; transform-style: preserve-3d; }
        .face { position: absolute; transform-style: preserve-3d; }
        
        .floor { 
            width: 2000px; height: 2000px; background: #3d6b28; 
            background-image: repeating-linear-gradient(0deg, transparent, transparent 49px, #2d5016 50px), 
                              repeating-linear-gradient(90deg, transparent, transparent 49px, #2d5016 50px);
            transform: rotateX(90deg) translate3d(-1000px, -1000px, 0); 
        }
        .wall { width: 2000px; height: 600px; background: #7a7a7a; border: 10px solid #555; }
        
        /* BLOKKEN */
        .block { width: 100px; height: 100px; background: #8b4513; border: 4px solid #5d2906; position: absolute; }
    </style>
</head>
<body onmousedown="handleAction(event)">

    <div id="overlay" onclick="startEngine()">
        <h1 style="color: #4caf50; font-size: 50px; text-shadow: 4px 4px #000;">MINECRAFT ARENA PRO</h1>
        <button style="padding: 20px 40px; font-size: 24px; background: #4caf50; color: white; border: 4px solid #1e3b0e; cursor: pointer;">ENTER WORLD</button>
        <p style="margin-top: 20px;">WASD = Lopen | B = Vliegen | Rechtsklik = Bouwen</p>
    </div>

    <div id="crosshair">+</div>

    <div id="hand-container">
        <div id="sword-pixel"></div>
    </div>

    <div id="gui">
        MODE: <span id="mode-text">SURVIVAL</span> | POS: <span id="pos-text">0,0,0</span>
    </div>

    <div id="viewport">
        <div id="world">
            <div class="face floor"></div>
            <div class="face wall" style="transform: translate3d(-1000px, -600px, 1000px);"></div>
            <div class="face wall" style="transform: translate3d(-1000px, -600px, -1000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-1000px, -600px, 1000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-1000px, -600px, -1000px);"></div>
            <div id="placed-blocks"></div>
        </div>
    </div>

    <script>
        let posX = 0, posZ = 0, posY = 0, rotY = 0, rotX = 0, velY = 0;
        let keys = {};
        let isBuildMode = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startEngine() {
            document.getElementById('overlay').style.display = 'none';
            document.body.requestPointerLock();
            audioCtx.resume();
            animate();
        }

        function handleAction(e) {
            if (e.button === 0) { // Slaan
                document.getElementById('hand-container').classList.add('swing');
                playSound(150, 'sine', 0.1); // Swoosh
                setTimeout(() => document.getElementById('hand-container').classList.remove('swing'), 100);
            } else if (e.button === 2 && isBuildMode) { // Bouwen
                placeBlock();
                playSound(400, 'square', 0.05); // Pop
            }
        }

        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyB') {
                isBuildMode = !isBuildMode;
                document.getElementById('mode-text').innerText = isBuildMode ? "CREATIVE (FLY)" : "SURVIVAL";
                velY = 0;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                rotY -= e.movementX * 0.2;
                rotX -= e.movementY * 0.2;
                rotX = Math.max(-70, Math.min(70, rotX));
            }
        });

        function placeBlock() {
            const b = document.createElement('div');
            b.className = 'block';
            let bx = Math.round(-posX / 100) * 100 - 50;
            let bz = Math.round(-posZ / 100) * 100 - 50;
            b.style.transform = `translate3d(${bx}px, ${-posY - 50}px, ${bz}px)`;
            document.getElementById('placed-blocks').appendChild(b);
        }

        function animate() {
            const speed = isBuildMode ? 15 : 8;
            const rad = rotY * Math.PI / 180;

            if (keys['KeyW']) { posX -= Math.sin(rad) * speed; posZ += Math.cos(rad) * speed; }
            if (keys['KeyS']) { posX += Math.sin(rad) * speed; posZ -= Math.cos(rad) * speed; }
            if (keys['KeyA']) { posX -= Math.cos(rad) * speed; posZ -= Math.sin(rad) * speed; }
            if (keys['KeyD']) { posX += Math.cos(rad) * speed; posZ += Math.sin(rad) * speed; }

            if (isBuildMode) {
                if (keys['Space']) posY += speed;
                if (keys['ShiftLeft']) posY -= speed;
            } else {
                if (keys['Space'] && posY <= 0) velY = 14;
                posY += velY;
                if (posY > 0) velY -= 0.9; else { posY = 0; velY = 0; }
            }

            const world = document.getElementById('world');
            world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translate3d(${posX}px, ${150 + posY}px, ${posZ}px)`;

            document.getElementById('pos-text').innerText = `${Math.round(posX/100)}, ${Math.round(posY/100)}, ${Math.round(posZ/100)}`;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
