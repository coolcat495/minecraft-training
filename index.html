<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Arena - Werkt Altijd</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; z-index: 10; pointer-events: none; }
        #instructions { position: absolute; top: 20%; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px #000; z-index: 5; pointer-events: none; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border: 2px solid #4caf50; }
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="instructions">KLIK OP HET SCHERM OM TE SPELEN<br>(WASD = Lopen | Muis = Rondkijken | ESC = Stop)</div>
    <div id="hud">Arena: 20x20 | Pos: <span id="pos">0, 0</span></div>

    <!-- We laden Three.js direct via een betrouwbare bron -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        let scene, camera, renderer, controls;
        let moveF = false, moveB = false, moveL = false, moveR = false;
        let velocity = new THREE.Vector3();
        let prevTime = performance.now();

        // 1. Setup de Wereld
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 0, 50);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Licht
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // 3. De Arena (Vloer + Muren)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20), 
            new THREE.MeshLambertMaterial({ color: 0x4a9142 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const wallGeo = new THREE.BoxGeometry(20, 5, 0.5);
        
        const nWall = new THREE.Mesh(wallGeo, wallMat); nWall.position.set(0, 2.5, -10); scene.add(nWall);
        const sWall = new THREE.Mesh(wallGeo, wallMat); sWall.position.set(0, 2.5, 10); scene.add(sWall);
        const eWall = new THREE.Mesh(wallGeo, wallMat); eWall.position.set(10, 2.5, 0); eWall.rotation.y = Math.PI/2; scene.add(eWall);
        const wWall = new THREE.Mesh(wallGeo, wallMat); wWall.position.set(-10, 2.5, 0); wWall.rotation.y = Math.PI/2; scene.add(wWall);

        // 4. Besturing (PointerLock)
        controls = new THREE.PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());
        
        controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
        controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'block');

        // Toetsenbord
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true;
            if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false;
            if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

        // 5. De Game Loop
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                if (moveF) velocity.z -= 100.0 * delta;
                if (moveB) velocity.z += 100.0 * delta;
                if (moveL) velocity.x -= 100.0 * delta;
                if (moveR) velocity.x += 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                document.getElementById('pos').innerText = `${camera.position.x.toFixed(0)}, ${camera.position.z.toFixed(0)}`;
                prevTime = time;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
