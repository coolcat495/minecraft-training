<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Training - 3D World</title>
    <style>
        /* ALLE WEBSITE STYLES UIT JOUW ONTWERP */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: #fff; overflow: hidden; }
        
        #menuContainer { width: 100%; height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #1a1a1a 0%, #2d5016 100%); }
        .header { background: rgba(0, 0, 0, 0.8); padding: 15px 30px; border-bottom: 3px solid #2d5016; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 28px; color: #4caf50; }
        .content { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 250px; background: rgba(0, 0, 0, 0.9); border-right: 2px solid #2d5016; padding: 20px; }
        .menu-btn { width: 100%; padding: 12px; margin: 5px 0; background: rgba(76, 175, 80, 0.1); border: 2px solid #4caf50; color: #fff; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .menu-btn:hover { background: #4caf50; color: #000; }
        
        .main-area { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* 3D GAME CONTAINER */
        #gameContainer { display: none; width: 100%; height: 100vh; position: relative; }
        #canvas { display: block; width: 100%; height: 100%; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; pointer-events: none; }
        #hud { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- HET MENU -->
    <div id="menuContainer">
        <div class="header">
            <h1>Minecraft Training Center</h1>
            <div class="stat">Speler: jooren</div>
        </div>
        <div class="content">
            <div class="sidebar">
                <p style="color: #4caf50; font-size: 12px; margin-bottom: 10px;">TRAININGEN</p>
                <button class="menu-btn" onclick="startWorld()">PVP Training</button>
                <button class="menu-btn" onclick="startWorld()">Build Mode</button>
                <button class="menu-btn" style="margin-top: 20px; border-color: red;" onclick="alert('Admin nodig voor instellingen')">Settings</button>
            </div>
            <div class="main-area">
                <h2 style="font-size: 40px; color: #4caf50;">KLAAR VOOR DE START?</h2>
                <p style="margin: 20px; color: #aaa;">Kies een training aan de linkerkant om de wereld in te gaan.</p>
            </div>
        </div>
    </div>

    <!-- DE 3D WERELD -->
    <div id="gameContainer">
        <div id="crosshair"></div>
        <div id="hud">
            <p>Shift = Crouch | ESC = Menu</p>
            <p id="coords">X: 0, Y: 1.6, Z: 0</p>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Scripts voor 3D Engine -->
    <script src="https://cdnjs.cloudflare.com"></script>

    <script>
        let scene, camera, renderer;

        function startWorld() {
            document.getElementById('menuContainer').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            init3D();
        }

        function init3D() {
            // 1. Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Blauwe lucht
            
            // 2. Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // Normale ooghoogte

            // 3. Renderer setup
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // 4. De Grond
            const geometry = new THREE.PlaneGeometry(100, 100);
            const material = new THREE.MeshBasicMaterial({ color: 0x2d5016, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(geometry, material);
            ground.rotation.x = Math.PI / 2;
            scene.add(ground);

            // 5. Een blok om naar te kijken
            const cubeBox = new THREE.BoxGeometry(1, 1, 1);
            const cubeMat = new THREE.MeshBasicMaterial({ color: 0x4caf50 });
            const cube = new THREE.Mesh(cubeBox, cubeMat);
            cube.position.set(0, 0.5, -5);
            scene.add(cube);

            // Besturing: Shift voor Crouch
            window.addEventListener('keydown', (e) => {
                if(e.code === 'ShiftLeft') {
                    camera.position.y = 1.0; // Omlaag!
                    document.getElementById('coords').innerText = "X: 0, Y: 1.0 (CROUCH), Z: 0";
                }
                if(e.code === 'Escape') {
                    location.reload(); // Terug naar menu
                }
            });

            window.addEventListener('keyup', (e) => {
                if(e.code === 'ShiftLeft') {
                    camera.position.y = 1.6; // Weer omhoog
                    document.getElementById('coords').innerText = "X: 0, Y: 1.6, Z: 0";
                }
            });

            // Loop animatie
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.y += 0.01; // Het blokje draait een beetje
                renderer.render(scene, camera);
            }
            animate();
        }

        // Zorg dat het scherm meeschaalt
        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
