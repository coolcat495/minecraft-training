<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Arena - Debug Mode</title>
    <style>
        /* Alles in één bestand om blokkades te voorkomen */
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Courier New', monospace; color: white; }
        #overlay { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: rgba(0,0,0,0.8); z-index: 100; 
            cursor: pointer; text-align: center;
        }
        #gui { position: absolute; bottom: 20px; left: 20px; color: #4caf50; z-index: 10; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; z-index: 5; pointer-events: none; }
        
        /* De Arena Style (CSS 3D Engine - werkt zonder externe scripts!) */
        #viewport { width: 100vw; height: 100vh; perspective: 800px; display: flex; justify-content: center; align-items: center; }
        #world { width: 0; height: 0; transform-style: preserve-3d; transition: transform 0.05s linear; }
        .block { position: absolute; transform-style: preserve-3d; }
        .face { position: absolute; width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.2); }
        .floor { background: #2d5016; transform: rotateX(90deg) translateZ(0); width: 1000px; height: 1000px; left: -500px; top: -500px; }
        .wall { background: rgba(255, 255, 255, 0.1); border: 2px solid #4caf50; width: 1000px; height: 200px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startEngine()">
        <h1 style="color: #4caf50;">MINECRAFT ARENA</h1>
        <p>ER IS EEN PROBLEEM MET HET LADEN VAN EXTERNE SCRIPTS.</p>
        <p style="background: #444; padding: 10px; border-radius: 5px;">KLIK HIER OM DE NOOD-ARENA TE STARTEN</p>
        <p style="font-size: 12px; margin-top: 20px;">(Besturing: W, A, S, D + Pijltjestoetsen)</p>
    </div>

    <div id="crosshair">+</div>
    <div id="gui">Status: NOOD-ENGINE ACTIEF (Geen externe scripts nodig)</div>

    <div id="viewport">
        <div id="world">
            <!-- De Arena Vloer -->
            <div class="block floor"></div>
            <!-- De Muren -->
            <div class="face wall" style="transform: translateZ(500px) translateY(-200px) translateX(-500px);"></div>
            <div class="face wall" style="transform: translateZ(-500px) translateY(-200px) translateX(-500px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translateZ(500px) translateY(-200px) translateX(-500px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translateZ(-500px) translateY(-200px) translateX(-500px);"></div>
        </div>
    </div>

    <script>
        let posX = 0, posZ = 0, rotY = 0, rotX = -10;
        let keys = {};

        function startEngine() {
            document.getElementById('overlay').style.display = 'none';
            animate();
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            // Beweging (WASD)
            const speed = 5;
            if (keys['KeyW']) { posX -= Math.sin(rotY * Math.PI / 180) * speed; posZ += Math.cos(rotY * Math.PI / 180) * speed; }
            if (keys['KeyS']) { posX += Math.sin(rotY * Math.PI / 180) * speed; posZ -= Math.cos(rotY * Math.PI / 180) * speed; }
            if (keys['KeyA']) { posX -= Math.cos(rotY * Math.PI / 180) * speed; posZ -= Math.sin(rotY * Math.PI / 180) * speed; }
            if (keys['KeyD']) { posX += Math.cos(rotY * Math.PI / 180) * speed; posZ += Math.sin(rotY * Math.PI / 180) * speed; }

            // Rondkijken (Pijltjestoetsen ter vervanging van muis voor stabiliteit)
            if (keys['ArrowLeft']) rotY += 3;
            if (keys['ArrowRight']) rotY -= 3;
            if (keys['ArrowUp']) rotX -= 2;
            if (keys['ArrowDown']) rotX += 2;

            // Wereld updaten
            const world = document.getElementById('world');
            world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translate3d(${posX}px, 150px, ${posZ}px)`;

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
