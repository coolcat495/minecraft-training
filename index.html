<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Desert Arena - Build & Battle</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', monospace; }
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn { padding: 15px 40px; margin: 10px; background: #c6a664; border: 4px solid #856d3e; color: white; font-size: 20px; cursor: pointer; min-width: 250px; text-shadow: 2px 2px #000; }
        .btn:hover { background: #e0c080; }
        
        /* HOTBAR */
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.5); border: 4px solid #333; padding: 2px; z-index: 100; }
        .slot { width: 50px; height: 50px; border: 4px solid #8b8b8b; margin: 2px; background-size: 30px; background-position: center; background-repeat: no-repeat; image-rendering: pixelated; }
        .slot.active { border-color: #fff; box-shadow: inset 0 0 10px #fff; background-color: rgba(255,255,255,0.2); }

        /* VIEWMODELS (Handen/Zwaard) */
        #viewmodel { position: absolute; bottom: -20px; right: 10%; width: 350px; height: 350px; pointer-events: none; z-index: 50; transition: transform 0.1s; }
        #arm { position: absolute; bottom: -80px; right: 30px; width: 90px; height: 240px; background: #ffdbac; border: 4px solid #ccac8a; transform: rotate(-15deg); }
        #item-in-hand { position: absolute; bottom: 80px; right: 40px; width: 160px; height: 160px; background-size: contain; background-repeat: no-repeat; transform: rotate(-25deg); transition: 0.1s; }
        .swing { transform: rotate(-45deg) translateY(-60px) !important; }

        /* STEVE MODEL (3rd Person) */
        #steve { position: absolute; width: 60px; height: 140px; transform-style: preserve-3d; display: none; }
        #steve-head { position: absolute; width: 40px; height: 40px; background: #ffdbac; left: 10px; top: -40px; border: 2px solid #000; }
        #steve-body { position: absolute; width: 40px; height: 60px; background: #00acc1; left: 10px; top: 0; border: 2px solid #000; }
        #steve-legs { position: absolute; width: 40px; height: 60px; background: #3f51b5; left: 10px; top: 60px; border: 2px solid #000; }

        /* WORLD ENGINE */
        #viewport { width: 100vw; height: 100vh; perspective: 900px; display: flex; justify-content: center; align-items: center; }
        #world { width: 0; height: 0; transform-style: preserve-3d; }
        .face { position: absolute; transform-style: preserve-3d; }
        .sand { width: 4000px; height: 4000px; background: #eedc9a; background-image: radial-gradient(#d4c282 10%, transparent 10%); background-size: 50px 50px; transform: rotateX(90deg) translate3d(-2000px, -2000px, 0); }
        .wall { width: 4000px; height: 1000px; background: #d2b48c; border: 20px solid #a0522d; opacity: 0.9; }
        .tree { width: 40px; height: 200px; background: #5d4037; position: absolute; }
        .leaves { width: 120px; height: 120px; background: #2e7d32; position: absolute; top: -100px; left: -40px; border-radius: 10%; }
    </style>
</head>
<body onmousedown="handleAction(event)">

    <div id="menu">
        <h1 style="color: #eedc9a; font-size: 50px; text-shadow: 4px 4px #000;">DESERT BATTLE ARENA</h1>
        <button class="btn" onclick="start(false)">PVP MODE (SURVIVAL)</button>
        <button class="btn" onclick="start(true)">BUILD MODE (CREATIVE)</button>
        <p style="color: #ddd;">F4 = Camera | 1-9 = Hotbar | W-A-S-D = Bewegen</p>
    </div>

    <div id="hotbar">
        <div class="slot active" id="s1" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" id="s2" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" id="s3" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" id="s4" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" id="s5" style="background-image: url('https://minecraft.wiki');"></div>
        <div class="slot" id="s6"></div><div class="slot" id="s7"></div><div class="slot" id="s8"></div><div class="slot" id="s9"></div>
    </div>

    <div id="viewmodel">
        <div id="item-in-hand" style="background-image: url('https://minecraft.wiki');"></div>
        <div id="arm"></div>
    </div>

    <div id="viewport">
        <div id="world">
            <div id="steve">
                <div id="steve-head"></div><div id="steve-body"></div><div id="steve-legs"></div>
            </div>
            <div class="face sand"></div>
            <!-- Muren -->
            <div class="face wall" style="transform: translate3d(-2000px, -1000px, 2000px);"></div>
            <div class="face wall" style="transform: translate3d(-2000px, -1000px, -2000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-2000px, -1000px, 2000px);"></div>
            <div class="face wall" style="transform: rotateY(90deg) translate3d(-2000px, -1000px, -2000px);"></div>
            <!-- Simpele Boomen -->
            <div style="transform: translate3d(500px, -200px, 500px)" class="face tree"><div class="leaves"></div></div>
            <div style="transform: translate3d(-800px, -200px, -400px)" class="face tree"><div class="leaves"></div></div>
        </div>
    </div>

    <script>
        let posX = 0, posZ = 0, posY = 0, rotY = 0, rotX = 0, velY = 0;
        let keys = {}, creative = false, viewMode = 0; // 0=1st, 1=3rd, 2=2nd
        let activeSlot = 1;

        const items = {
            1: 'https://minecraft.wiki',
            2: 'https://minecraft.wiki',
            3: 'https://minecraft.wiki',
            4: 'https://minecraft.wiki',
            5: 'https://minecraft.wiki'
        };

        function start(mode) {
            creative = mode;
            document.getElementById('menu').style.display = 'none';
            document.body.requestPointerLock();
            if(creative) switchSlot(2); // Start met blokken in build mode
            animate();
        }

        function switchSlot(n) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('s'+n).classList.add('active');
            activeSlot = n;
            const img = items[n] || '';
            document.getElementById('item-in-hand').style.backgroundImage = `url('${img}')`;
        }

        function handleAction(e) {
            const vm = document.getElementById('viewmodel');
            vm.classList.add('swing');
            setTimeout(() => vm.classList.remove('swing'), 100);
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.key >= '1' && e.key <= '9') switchSlot(parseInt(e.key));
            if(e.code === 'F4') {
                viewMode = (viewMode + 1) % 3;
                document.getElementById('steve').style.display = viewMode === 0 ? "none" : "block";
                document.getElementById('viewmodel').style.display = viewMode === 0 ? "block" : "none";
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                rotY -= e.movementX * 0.15;
                rotX -= e.movementY * 0.15;
                rotX = Math.max(-85, Math.min(85, rotX));
            }
        });

        function animate() {
            const speed = creative ? 15 : 8;
            const rad = rotY * Math.PI / 180;

            let nX = posX, nZ = posZ;
            if (keys['KeyW']) { nX -= Math.sin(rad) * speed; nZ += Math.cos(rad) * speed; }
            if (keys['KeyS']) { nX += Math.sin(rad) * speed; nZ -= Math.cos(rad) * speed; }
            if (keys['KeyA']) { nX -= Math.cos(rad) * speed; nZ -= Math.sin(rad) * speed; }
            if (keys['KeyD']) { nX += Math.cos(rad) * speed; nZ += Math.sin(rad) * speed; }

            if (Math.abs(nX) < 1900) posX = nX;
            if (Math.abs(nZ) < 1900) posZ = nZ;

            if (creative) {
                if (keys['Space']) posY += speed;
                if (keys['ShiftLeft']) posY -= speed;
            } else {
                if (keys['Space'] && posY <= 0) velY = 12;
                posY += velY;
                if (posY > 0) velY -= 0.8; else { posY = 0; velY = 0; }
            }

            // Steve Model updaten
            const steve = document.getElementById('steve');
            steve.style.transform = `translate3d(${-posX}px, ${-posY-20}px, ${-posZ}px) rotateY(${-rotY}deg)`;

            // Camera instellingen
            let cZ = 0, cY = 160 + posY, cRotY = rotY;
            if (viewMode === 1) { cZ = -500; } // Achterkant
            if (viewMode === 2) { cZ = 500; cRotY = rotY + 180; } // Voorkant

            const world = document.getElementById('world');
            world.style.transform = `rotateX(${rotX}deg) rotateY(${cRotY}deg) translate3d(${posX}px, ${cY}px, ${posZ}px) translateZ(${cZ}px)`;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
