<!DOCTYPE html>
<html>
<head>
    <title>3D Arena Test</title>
    <style>
        /* De 'Engine' zonder externe scripts */
        body { margin: 0; background: #87CEEB; overflow: hidden; perspective: 800px; font-family: sans-serif; }
        
        #world { 
            width: 100vw; height: 100vh; 
            transform-style: preserve-3d; 
            transform: rotateX(-20deg) rotateY(45deg) translateZ(-500px);
            transition: transform 0.1s;
        }

        /* De Arena Vloer */
        .floor { 
            position: absolute; width: 600px; height: 600px; 
            background: #4a9142; border: 5px solid #2d5016;
            transform: rotateX(90deg) translateZ(-300px) translateX(-300px);
        }

        /* Glazen Muren */
        .wall { 
            position: absolute; width: 600px; height: 200px; 
            background: rgba(255, 255, 255, 0.3); border: 2px solid white;
        }
        .n { transform: translateZ(300px) translateY(-300px) translateX(-300px); }
        .s { transform: translateZ(-300px) translateY(-300px) translateX(-300px); }
        .e { transform: rotateY(90deg) translateZ(300px) translateY(-300px) translateX(-300px); }
        .w { transform: rotateY(90deg) translateZ(-300px) translateY(-300px) translateX(-300px); }

        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 20px; border-radius: 10px; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>BATTLE ARENA TEST</h1>
        <p>Als je dit ziet, werkt je GitHub Page!</p>
        <p>Gebruik de pijltjestoetsen om de arena te draaien.</p>
    </div>

    <div id="world">
        <div class="floor"></div>
        <div class="wall n"></div>
        <div class="wall s"></div>
        <div class="wall e"></div>
        <div class="wall w"></div>
    </div>

    <script>
        // Simpele rotatie om te testen of JS werkt
        let rotY = 45;
        document.addEventListener('keydown', (e) => {
            if(e.key === "ArrowLeft") rotY -= 5;
            if(e.key === "ArrowRight") rotY += 5;
            document.getElementById('world').style.transform = `rotateX(-20deg) rotateY(${rotY}deg) translateZ(-500px)`;
        });
    </script>
</body>
</html>
